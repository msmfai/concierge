# Hermetic CI: build, lint, and test the workspace on Linux and macOS with no
# games, no network fixtures, and no Nix. Live tests (real installs, Nexus,
# CrossOver) are env-gated and skip themselves.
name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      # Pinned so CI reproduces exactly what's verified locally (deny-all
      # clippy would otherwise break on every new stable's lints); bump
      # deliberately.
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      # bsdtar drives archive extraction; preinstalled on macOS, package on Linux
      - name: Install libarchive (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libarchive-tools
      # Software Vulkan (Mesa lavapipe) so the wgpu render test can paint a frame
      # headlessly, and opt that test in on Linux (llvmpipe) — the render-path /
      # black-frame regression check from the visual-testing dossier.
      - name: Install Mesa/lavapipe (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y mesa-vulkan-drivers libvulkan1
          echo "CONCIERGE_WGPU_TESTS=1" >> "$GITHUB_ENV"
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets
      - name: Build
        run: cargo build --workspace
      - name: Test
        run: cargo test --workspace

  # The Windows agent-shell sandbox (Low-integrity confinement) can only be
  # verified on a real Windows host — the dev toolchain ships no Windows target,
  # so it never compiles locally. Build and lint concierge-core here, then run
  # the smoke test that actually spawns the sandbox and asserts the Low child can
  # write inside the write-set but is blocked from writing outside it.
  windows-sandbox:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy (concierge-core)
        run: cargo clippy -p concierge-core --lib
      - name: Test the sandbox confinement
        run: cargo test -p concierge-core --lib shell -- --nocapture
