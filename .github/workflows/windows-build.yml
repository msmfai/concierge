# On-demand Windows build for iterating on Windows-only issues without cutting a
# release. Produces a zip of concierge.exe (the GUI) + concierge-cli.exe as a workflow
# artifact (download with `gh run download`). The dev toolchain has no Windows
# target, so this is how a Windows build gets produced from a macOS dev machine.
name: Windows build (manual)

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
      - uses: Swatinem/rust-cache@v2
      - name: Build CLI + GUI + daemon
        run: cargo build --release -p concierge -p concierge-gui -p concierge-daemon
      - name: Package
        shell: pwsh
        run: |
          $name = "concierge-windows-dev"
          New-Item -ItemType Directory -Path $name | Out-Null
          # concierge.exe IS the GUI; concierge-cli.exe is the agent CLI. The
          # concierge-gui.exe copy keeps pre-rename installs updatable.
          Copy-Item target/release/concierge.exe, target/release/concierge-cli.exe, target/release/concierge-daemon.exe, LICENSE, README.md $name/
          Copy-Item target/release/concierge.exe $name/concierge-gui.exe
          Compress-Archive -Path $name -DestinationPath "$name.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: concierge-windows-dev
          path: concierge-windows-dev.zip
          retention-days: 14
